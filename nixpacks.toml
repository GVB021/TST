[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python311",
  "ffmpeg",
  "libsndfile"
]

[phases.install]
cmds = [
  "npm ci",
  "python3 -m venv .venv",
  ". .venv/bin/activate && pip install --no-cache-dir -r server/requirements.txt"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = ". .venv/bin/activate && npm run db:push && npm run start"